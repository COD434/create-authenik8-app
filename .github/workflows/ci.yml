name: CI

on:
  push:
    branches:
      - main
      - master
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  template-modes:
    name: ${{ matrix.mode }} mode
    runs-on: ubuntu-latest
    


    strategy:
      fail-fast: false
      matrix:
        include:
          - mode: base
            test_pattern: ^templates/express-base/src/server\.ts
          - mode: auth
            test_pattern: ^templates/express-auth/src/server\.ts
          - mode: auth-oauth
            test_pattern: ^templates/express-auth\+/src/server\.ts

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run CLI Tests with Coverage
        run: npm run test:coverage

      - name: Run Template Server Tests
        run: npm run test:templates

     
      - name: Verify ${{ matrix.mode }} mode
        run: node --import tsx --test --test-name-pattern="${{ matrix.test_pattern }}" tests/template-servers.test.mjs

   
  release:
    name: Semantic Release & Publish
    needs: template-modes          
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' 

    permissions:
      contents: write
      id-token: write
      packages: write
      attestations: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Semantic Release + Publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          npx semantic-release

      - name: Get the version from package.json
           id: get_version
           run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: List all files in workspace (debug)
        run: ls -la

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.pack.outputs.tarball}}


      - name: Pack tarball
        id: pack
        run: |
          TARBALL=$(npm pack --json | jq -r '.[0].filename')
          echo "tarball=$TARBALL" >> $GITHUB_OUTPUT


      - name: Upload tarball + attestation to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release upload "v${VERSION}" \
            "${{ steps.pack.outputs.tarball }}" \
            "${{ steps.attest.outputs.bundle
