name: CI

on:
  push:
    branches:
      - main
      - master
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  template-modes:
    name: ${{ matrix.mode }} mode
    runs-on: ubuntu-latest
    


    strategy:
      fail-fast: false
      matrix:
        include:
          - mode: base
            test_pattern: ^templates/express-base/src/server\.ts
          - mode: auth
            test_pattern: ^templates/express-auth/src/server\.ts
          - mode: auth-oauth
            test_pattern: ^templates/express-auth\+/src/server\.ts

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run CLI Tests with Coverage
        run: npm run test:coverage

      - name: Run Template Server Tests
        run: npm run test:templates


      - name: Verify ${{ matrix.mode }} mode
        run: node --import tsx --test --test-name-pattern="${{ matrix.test_pattern }}" tests/template-servers.test.mjs

   
  release:
    name: Semantic Release & Publish
    needs: template-modes          
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' 

    permissions:
      contents: write
      id-token: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Semantic Release + Publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
        run: npx semantic-release
