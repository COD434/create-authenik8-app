name: CI

on:
  push:
    branches:
      - main
      - master
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Linux quality gate
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20.19.x
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Build CLI
        run: npm run build

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Run template server tests
        run: npm run test:templates

      - name: Verify package contents
        run: npm pack --dry-run

  compatibility:
    name: ${{ matrix.os_name }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os_name: Windows
            os: windows-latest
            node: 22.12.x
          - os_name: macOS
            os: macos-latest
            node: 24.x

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Build CLI
        run: npm run build

      - name: Run CLI tests
        run: npm test

      - name: Run template server tests
        run: npm run test:templates

  fresh-project:
    name: Fresh ${{ matrix.preset }} install / Node 22
    needs: [quality]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        preset: [auth-oauth, fullstack]

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.12.x
          cache: npm

      - name: Install and build the generator
        run: npm ci --prefer-offline --no-audit --no-fund && npm run build

      - name: Generate, install, and build a clean project
        run: npm run test:fresh -- ${{ matrix.preset }}

  release:
    name: Semantic Release & Publish
    needs: [quality, compatibility, fresh-project]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' 

    permissions:
      contents: write
      id-token: write
      packages: write
      attestations: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Snapshot tags before release
        run: git tag --points-at HEAD > "$RUNNER_TEMP/tags-before-release"

      - name: Semantic Release + Publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: npx semantic-release

      - name: Find release created for this commit
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=""

          while IFS= read -r CANDIDATE; do
            if ! grep -Fqx "$CANDIDATE" "$RUNNER_TEMP/tags-before-release"; then
              TAG="$CANDIDATE"
              break
            fi
          done < <(git tag --points-at HEAD --sort=-version:refname)

          if [ -n "$TAG" ] && gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack release tarball
        if: steps.release.outputs.published == 'true'
        id: pack
        run: |
          TARBALL=$(npm pack --json | jq -r '.[0].filename')
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        if: steps.release.outputs.published == 'true'
        id: attest
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: ${{ steps.pack.outputs.tarball }}

      - name: Prepare Scorecard provenance asset
        if: steps.release.outputs.published == 'true'
        id: provenance
        env:
          BUNDLE_PATH: ${{ steps.attest.outputs.bundle-path }}
          TARBALL: ${{ steps.pack.outputs.tarball }}
        run: |
          PROVENANCE="${TARBALL}.intoto.jsonl"
          cp "$BUNDLE_PATH" "$PROVENANCE"
          echo "path=$PROVENANCE" >> "$GITHUB_OUTPUT"

      - name: Upload artifact and provenance to GitHub Release
        if: steps.release.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          TARBALL: ${{ steps.pack.outputs.tarball }}
          PROVENANCE: ${{ steps.provenance.outputs.path }}
        run: |
          gh release upload "$RELEASE_TAG" "$TARBALL" "$PROVENANCE" \
            --clobber \
            --repo "$GITHUB_REPOSITORY"
