version: 2
updates:
  
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "fix(deps)"
    open-pull-requests-limit: 10

  
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"

  - package-ecosystem: npm
    directory: /templates/express-auth+
    schedule:
      interval: daily

  - package-ecosystem: npm
    directory: /templates/express-auth
    schedule:
      interval: daily

  - package-ecosystem: npm
    directory: /templates/express-base
    schedule:
      interval: daily
